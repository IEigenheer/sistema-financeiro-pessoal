openapi: 3.1.0
info:
  title: Sistema Financeiro Pessoal API
  version: 0.1.0
  description: >-
    Contrato inicial da feature 001-nucleo-controle-financeiro. Define fluxos
    funcionais planejados sem representar implementação pronta.
servers:
  - url: http://localhost:3333
    description: Ambiente local planejado
paths:
  /v1/financial-settings:
    get:
      summary: Obter configuração financeira ativa
      tags: [Financial Settings]
      responses:
        '200':
          description: Configuração financeira atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialSettings'
    put:
      summary: Criar ou substituir configuração financeira ativa
      tags: [Financial Settings]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertFinancialSettingsRequest'
      responses:
        '200':
          description: Configuração atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialSettings'
  /v1/financial-settings/start-date-preview:
    post:
      summary: Visualizar impacto da alteração da data inicial
      tags: [Financial Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartDatePreviewRequest'
      responses:
        '200':
          description: Preview da alteração
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeImpactPreview'
  /v1/categories:
    get:
      summary: Listar categorias de despesas
      tags: [Categories]
      responses:
        '200':
          description: Lista de categorias de despesas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      summary: Criar categoria de despesa
      tags: [Categories]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Categoria criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
  /v1/categories/{categoryId}:
    patch:
      summary: Editar ou desativar categoria de despesa
      tags: [Categories]
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Categoria atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
  /v1/entries:
    get:
      summary: Listar lançamentos financeiros
      tags: [Entries]
      parameters:
        - $ref: '#/components/parameters/MonthQuery'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/EntryStatus'
        - in: query
          name: kind
          schema:
            $ref: '#/components/schemas/EntryKind'
      responses:
        '200':
          description: Lista de lançamentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FinancialEntry'
    post:
      summary: Criar lançamento manual de receita extra ou despesa
      tags: [Entries]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFinancialEntryRequest'
      responses:
        '201':
          description: Lançamento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialEntry'
        '409':
          description: Possível duplicidade detectada; o cliente pode confirmar explicitamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateWarningResponse'
  /v1/entries/duplicate-check:
    post:
      summary: Verificar possível duplicidade antes de criar lançamento
      tags: [Entries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateCheckRequest'
      responses:
        '200':
          description: Resultado da verificação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateCheckResponse'
  /v1/entries/{entryId}:
    patch:
      summary: Atualizar lançamento ou mudar status de planejado para realizado
      tags: [Entries]
      parameters:
        - $ref: '#/components/parameters/EntryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFinancialEntryRequest'
      responses:
        '200':
          description: Lançamento atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialEntry'
  /v1/recurrence-rules:
    get:
      summary: Listar regras de despesas fixas recorrentes
      tags: [Recurrence Rules]
      responses:
        '200':
          description: Lista de regras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecurrenceRule'
    post:
      summary: Criar despesa fixa recorrente
      tags: [Recurrence Rules]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecurrenceRuleRequest'
      responses:
        '201':
          description: Regra criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurrenceRule'
  /v1/recurrence-rules/{ruleId}:
    patch:
      summary: Editar ou inativar despesa fixa recorrente
      tags: [Recurrence Rules]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecurrenceRuleRequest'
      responses:
        '200':
          description: Regra atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurrenceRule'
  /v1/installment-plans:
    get:
      summary: Listar parcelamentos
      tags: [Installment Plans]
      responses:
        '200':
          description: Lista de parcelamentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstallmentPlan'
    post:
      summary: Criar parcelamento
      tags: [Installment Plans]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstallmentPlanRequest'
      responses:
        '201':
          description: Parcelamento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentPlan'
  /v1/installment-plans/{planId}/change-preview:
    post:
      summary: Visualizar impacto da alteração de parcelamento
      tags: [Installment Plans]
      parameters:
        - $ref: '#/components/parameters/PlanId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInstallmentPlanRequest'
      responses:
        '200':
          description: Preview da alteração
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentChangePreview'
  /v1/installment-plans/{planId}:
    patch:
      summary: Alterar parcelamento preservando histórico realizado
      tags: [Installment Plans]
      parameters:
        - $ref: '#/components/parameters/PlanId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInstallmentPlanRequest'
      responses:
        '200':
          description: Parcelamento atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentPlan'
  /v1/installment-plans/{planId}/cancel-preview:
    post:
      summary: Visualizar impacto do cancelamento de parcelamento
      tags: [Installment Plans]
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Preview do cancelamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentCancelPreview'
  /v1/installment-plans/{planId}/cancel:
    post:
      summary: Cancelar parcelamento preservando parcelas realizadas
      tags: [Installment Plans]
      parameters:
        - $ref: '#/components/parameters/PlanId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Parcelamento cancelado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentPlan'
  /v1/investment-movements:
    get:
      summary: Listar movimentações de investimento
      tags: [Investment Movements]
      parameters:
        - $ref: '#/components/parameters/MonthQuery'
        - in: query
          name: movementType
          schema:
            $ref: '#/components/schemas/InvestmentMovementType'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/EntryStatus'
      responses:
        '200':
          description: Lista de movimentações
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvestmentMovement'
    post:
      summary: Criar movimentação de investimento
      tags: [Investment Movements]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvestmentMovementRequest'
      responses:
        '201':
          description: Movimentação criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestmentMovement'
  /v1/investment-movements/{movementId}:
    patch:
      summary: Atualizar movimentação de investimento
      tags: [Investment Movements]
      parameters:
        - $ref: '#/components/parameters/MovementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvestmentMovementRequest'
      responses:
        '200':
          description: Movimentação atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestmentMovement'
  /v1/months/{month}/overview:
    get:
      summary: Consultar overview mensal consolidado
      tags: [Months]
      parameters:
        - $ref: '#/components/parameters/MonthPath'
      responses:
        '200':
          description: Overview mensal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyOverview'
  /v1/months/{month}/breakdown:
    get:
      summary: Consultar composição rastreável de um total mensal
      tags: [Months]
      parameters:
        - $ref: '#/components/parameters/MonthPath'
        - in: query
          name: metric
          required: true
          schema:
            type: string
            enum:
              - PLANNED_INCOME
              - REALIZED_INCOME
              - PLANNED_FIXED_EXPENSES
              - REALIZED_EXPENSES
              - VARIABLE_EXPENSES
              - INSTALLMENTS
              - CONTRIBUTIONS
              - YIELDS
              - OPERATIONAL_BALANCE
              - INVESTMENT_BALANCE
              - PLANNED_VS_REALIZED_DELTA
      responses:
        '200':
          description: Detalhamento do valor consolidado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyBreakdown'
  /v1/dashboard:
    get:
      summary: Consultar dashboard inicial
      tags: [Dashboard]
      parameters:
        - $ref: '#/components/parameters/MonthQuery'
      responses:
        '200':
          description: Indicadores e séries do dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
  /v1/audit/{entityName}/{entityId}:
    get:
      summary: Consultar trilha de auditoria de uma entidade
      tags: [Audit]
      parameters:
        - $ref: '#/components/parameters/EntityName'
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          description: Eventos de auditoria da entidade
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEvent'
components:
  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: Chave para deduplicação técnica de operações repetidas.
    CategoryId:
      in: path
      name: categoryId
      required: true
      schema:
        type: string
        format: uuid
    EntryId:
      in: path
      name: entryId
      required: true
      schema:
        type: string
        format: uuid
    RuleId:
      in: path
      name: ruleId
      required: true
      schema:
        type: string
        format: uuid
    PlanId:
      in: path
      name: planId
      required: true
      schema:
        type: string
        format: uuid
    MovementId:
      in: path
      name: movementId
      required: true
      schema:
        type: string
        format: uuid
    MonthPath:
      in: path
      name: month
      required: true
      schema:
        $ref: '#/components/schemas/MonthDate'
    MonthQuery:
      in: query
      name: month
      required: false
      schema:
        $ref: '#/components/schemas/MonthDate'
    EntityName:
      in: path
      name: entityName
      required: true
      schema:
        type: string
        enum: [FINANCIAL_SETTINGS, CATEGORY, FINANCIAL_ENTRY, RECURRENCE_RULE, INSTALLMENT_PLAN, INVESTMENT_MOVEMENT]
    EntityId:
      in: path
      name: entityId
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    LocalDate:
      type: string
      format: date
      pattern: '^\\d{4}-\\d{2}-\\d{2}$'
      example: '2026-07-23'
    MonthDate:
      type: string
      format: date
      pattern: '^\\d{4}-\\d{2}-01$'
      example: '2026-07-01'
    MoneyString:
      type: string
      pattern: '^-?\\d+\\.\\d{2}$'
      example: '1250.00'
    PositiveMoneyString:
      type: string
      pattern: '^(0|[1-9]\\d*)\\.\\d{2}$'
      example: '500.00'
    StrictPositiveMoneyString:
      type: string
      pattern: '^[1-9]\\d*\\.\\d{2}$|^0\\.[0-9][1-9]$|^0\\.[1-9][0-9]$'
      example: '250.00'
    RateString:
      type: string
      pattern: '^\\d+\\.\\d{1,8}$'
      example: '0.00750000'
    EntryStatus:
      type: string
      enum: [PLANNED, REALIZED, CANCELED]
    EntryKind:
      type: string
      enum: [SALARY_INSTALLMENT, EXTRA_INCOME, FIXED_EXPENSE_OCCURRENCE, VARIABLE_EXPENSE, INSTALLMENT_CHARGE]
    EntryDirection:
      type: string
      enum: [INFLOW, OUTFLOW]
    InvestmentMovementType:
      type: string
      enum: [CONTRIBUTION, YIELD, WITHDRAWAL, MANUAL_ADJUSTMENT]
    AdjustmentTarget:
      type: string
      enum: [OPERATIONAL_BALANCE, INVESTMENT_BALANCE]
    AdjustmentDirection:
      type: string
      enum: [INCREASE, DECREASE]
    RecurrenceRuleStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
    InstallmentPlanStatus:
      type: string
      enum: [ACTIVE, CANCELED, COMPLETED]
    InstallmentItemStatus:
      type: string
      enum: [OPEN, REALIZED, CANCELED]
    StartDatePreviewRequest:
      type: object
      required: [newControlStartDate]
      properties:
        newControlStartDate:
          $ref: '#/components/schemas/LocalDate'
      additionalProperties: false
      example:
        newControlStartDate: '2026-02-01'
    FinancialSettings:
      type: object
      required: [controlStartDate, monthlyNetSalary, firstSalaryInstallmentAmount, firstSalaryInstallmentDay, secondSalaryInstallmentAmount, secondSalaryInstallmentDateRule, defaultMonthlyContribution, projectedMonthlyInvestmentYieldRate, initialOperationalBalance, initialInvestmentBalance]
      properties:
        controlStartDate: { $ref: '#/components/schemas/LocalDate' }
        monthlyNetSalary: { $ref: '#/components/schemas/PositiveMoneyString' }
        firstSalaryInstallmentAmount: { $ref: '#/components/schemas/PositiveMoneyString' }
        firstSalaryInstallmentDay: { type: integer, minimum: 1, maximum: 31 }
        secondSalaryInstallmentAmount: { $ref: '#/components/schemas/PositiveMoneyString' }
        secondSalaryInstallmentDateRule: { type: string, enum: [LAST_DAY_OF_MONTH] }
        defaultMonthlyContribution: { $ref: '#/components/schemas/PositiveMoneyString' }
        projectedMonthlyInvestmentYieldRate: { $ref: '#/components/schemas/RateString' }
        initialOperationalBalance: { $ref: '#/components/schemas/PositiveMoneyString' }
        initialInvestmentBalance: { $ref: '#/components/schemas/PositiveMoneyString' }
    UpsertFinancialSettingsRequest:
      type: object
      required: [controlStartDate, monthlyNetSalary, firstSalaryInstallmentAmount, firstSalaryInstallmentDay, defaultMonthlyContribution, projectedMonthlyInvestmentYieldRate, initialOperationalBalance, initialInvestmentBalance]
      properties:
        controlStartDate: { $ref: '#/components/schemas/LocalDate' }
        monthlyNetSalary: { $ref: '#/components/schemas/PositiveMoneyString' }
        firstSalaryInstallmentAmount: { $ref: '#/components/schemas/PositiveMoneyString' }
        firstSalaryInstallmentDay: { type: integer, minimum: 1, maximum: 31 }
        defaultMonthlyContribution: { $ref: '#/components/schemas/PositiveMoneyString' }
        projectedMonthlyInvestmentYieldRate: { $ref: '#/components/schemas/RateString' }
        initialOperationalBalance: { $ref: '#/components/schemas/PositiveMoneyString' }
        initialInvestmentBalance: { $ref: '#/components/schemas/PositiveMoneyString' }
      additionalProperties: false
      example:
        controlStartDate: '2026-01-01'
        monthlyNetSalary: '8500.00'
        firstSalaryInstallmentAmount: '3000.00'
        firstSalaryInstallmentDay: 15
        defaultMonthlyContribution: '1200.00'
        projectedMonthlyInvestmentYieldRate: '0.00800000'
        initialOperationalBalance: '2500.00'
        initialInvestmentBalance: '10000.00'
    Category:
      type: object
      required: [id, name, isActive]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        isActive: { type: boolean }
      description: Categoria utilizada exclusivamente para classificar despesas.
    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
      additionalProperties: false
      example:
        name: Moradia
    UpdateCategoryRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        isActive: { type: boolean }
      additionalProperties: false
    FinancialEntry:
      type: object
      required: [id, kind, direction, status, description, competencyMonth, plannedDate, plannedAmount, origin]
      properties:
        id: { type: string, format: uuid }
        kind: { $ref: '#/components/schemas/EntryKind' }
        direction: { $ref: '#/components/schemas/EntryDirection' }
        status: { $ref: '#/components/schemas/EntryStatus' }
        description: { type: string }
        categoryId: { type: string, format: uuid, nullable: true }
        competencyMonth: { $ref: '#/components/schemas/MonthDate' }
        plannedDate: { $ref: '#/components/schemas/LocalDate' }
        effectiveDate: { $ref: '#/components/schemas/LocalDate', nullable: true }
        plannedAmount: { $ref: '#/components/schemas/StrictPositiveMoneyString' }
        effectiveAmount: { $ref: '#/components/schemas/StrictPositiveMoneyString', nullable: true }
        origin:
          type: string
          enum: [MANUAL, SYSTEM_SALARY, RECURRENCE_RULE, INSTALLMENT_PLAN, START_DATE_RECALCULATION]
        recurrenceRuleId: { type: string, format: uuid, nullable: true }
        installmentPlanId: { type: string, format: uuid, nullable: true }
        installmentItemId: { type: string, format: uuid, nullable: true }
    CreateFinancialEntryRequest:
      type: object
      required: [kind, status, description, plannedDate, plannedAmount]
      properties:
        kind:
          type: string
          enum: [EXTRA_INCOME, VARIABLE_EXPENSE]
          description: Receitas salariais automáticas, recorrências e parcelas não são criadas por este endpoint.
        status: { type: string, enum: [PLANNED, REALIZED] }
        description: { type: string, minLength: 1, maxLength: 255 }
        categoryId:
          type: string
          format: uuid
          nullable: true
          description: Obrigatório para despesa variável e proibido para receita extra.
        plannedDate: { $ref: '#/components/schemas/LocalDate' }
        effectiveDate: { $ref: '#/components/schemas/LocalDate', nullable: true }
        plannedAmount: { $ref: '#/components/schemas/StrictPositiveMoneyString' }
        effectiveAmount: { $ref: '#/components/schemas/StrictPositiveMoneyString', nullable: true }
        confirmDuplicate: { type: boolean, default: false }
      additionalProperties: false
      example:
        kind: VARIABLE_EXPENSE
        status: PLANNED
        description: Conta de energia
        categoryId: 2c2d69d9-f1c2-4d17-bfd0-cd47c18a3de1
        plannedDate: '2026-07-10'
        plannedAmount: '220.35'
        confirmDuplicate: false
    UpdateFinancialEntryRequest:
      type: object
      properties:
        status: { type: string, enum: [PLANNED, REALIZED, CANCELED] }
        description: { type: string, maxLength: 255 }
        categoryId: { type: string, format: uuid, nullable: true }
        plannedDate: { $ref: '#/components/schemas/LocalDate' }
        effectiveDate: { $ref: '#/components/schemas/LocalDate', nullable: true }
        plannedAmount: { $ref: '#/components/schemas/StrictPositiveMoneyString' }
        effectiveAmount: { $ref: '#/components/schemas/StrictPositiveMoneyString', nullable: true }
      additionalProperties: false
    DuplicateCheckRequest:
      type: object
      required: [kind, plannedDate, plannedAmount, description]
      properties:
        kind: { type: string, enum: [EXTRA_INCOME, VARIABLE_EXPENSE] }
        plannedDate: { $ref: '#/components/schemas/LocalDate' }
        plannedAmount: { $ref: '#/components/schemas/StrictPositiveMoneyString' }
        description: { type: string }
        categoryId: { type: string, format: uuid, nullable: true }
      additionalProperties: false
      example:
        kind: VARIABLE_EXPENSE
        plannedDate: '2026-07-10'
        plannedAmount: '220.35'
        description: Conta de energia
        categoryId: 2c2d69d9-f1c2-4d17-bfd0-cd47c18a3de1
    DuplicateCheckResponse:
      type: object
      properties:
        possibleDuplicate: { type: boolean }
        matches:
          type: array
          items:
            $ref: '#/components/schemas/FinancialEntry'
    DuplicateWarningResponse:
      allOf:
        - $ref: '#/components/schemas/DuplicateCheckResponse'
        - type: object
          properties:
            code: { type: string, example: POSSIBLE_DUPLICATE }
    RecurrenceRule:
      type: object
      required: [id, description, categoryId, defaultAmount, dueDay, startDate, status]
      properties:
        id: { type: string, format: uuid }
        description: { type: string }
        categoryId: { type: string, format: uuid }
        defaultAmount: { $ref: '#/components/schemas/StrictPositiveMoneyString' }
        dueDay: { type: integer, minimum: 1, maximum: 31 }
        startDate: { $ref: '#/components/schemas/LocalDate' }
        endDate: { $ref: '#/components/schemas/LocalDate', nullable: true }
        status: { $ref: '#/components/schemas/RecurrenceRuleStatus' }
    CreateRecurrenceRuleRequest:
      type: object
      required: [description, categoryId, defaultAmount, dueDay, startDate]
      properties:
        description: { type: string, minLength: 1, maxLength: 255 }
        categoryId: { type: string, format: uuid }
        defaultAmount: { $ref: '#/components/schemas/StrictPositiveMoneyString' }
        dueDay: { type: integer, minimum: 1, maximum: 31 }
        startDate: { $ref: '#/components/schemas/LocalDate' }
        endDate: { $ref: '#/components/schemas/LocalDate', nullable: true }
        status: { $ref: '#/components/schemas/RecurrenceRuleStatus' }
      additionalProperties: false
      example:
        description: Aluguel
        categoryId: 2c2d69d9-f1c2-4d17-bfd0-cd47c18a3de1
        defaultAmount: '1800.00'
        dueDay: 5
        startDate: '2026-01-01'
        status: ACTIVE
    UpdateRecurrenceRuleRequest:
      type: object
      properties:
